# Supabase local development — https://supabase.com/docs/guides/cli/config
project_id = "impactop"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.email.template.invite]
subject = "You're invited to Admin Dashboard"
content_path = "./supabase/templates/auth/invite.html"

[auth.email.template.recovery]
subject = "Reset your Admin Dashboard password"
content_path = "./supabase/templates/auth/recovery.html"

[auth.email.template.confirmation]
subject = "Confirm your Admin Dashboard email"
content_path = "./supabase/templates/auth/confirmation.html"

[auth.email.template.magic_link]
subject = "Your Admin Dashboard sign-in link"
content_path = "./supabase/templates/auth/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm your email change"
content_path = "./supabase/templates/auth/email_change.html"

[functions]
verify_jwt = true

[functions.create-organization]
verify_jwt = true

[functions.invite-member]
verify_jwt = true
