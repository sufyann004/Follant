<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm email change</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#0a0a0a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e5e5;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 8px;">
              <p style="margin:0 0 8px;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#737373;">Admin Dashboard</p>
              <h1 style="margin:0;font-size:22px;line-height:1.3;font-weight:700;">Confirm your new email</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;font-size:15px;line-height:1.6;color:#404040;">
              <p style="margin:0 0 16px;">Hello,</p>
              <p style="margin:0 0 24px;">Confirm the change to your account email address by clicking the button below.</p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0a0a0a;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 20px;border-radius:10px;">Confirm email change</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;font-size:12px;line-height:1.5;color:#737373;">
              <p style="margin:0;word-break:break-all;">{{ .ConfirmationURL }}</p>
            </td>
          </tr>
        </table>
        <p style="margin:16px 0 0;font-size:11px;color:#a3a3a3;">If you didn't request this change, contact your administrator immediately.</p>
      </td>
    </tr>
  </table>
</body>
</html>
